<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Learning Lounge — Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F3F4F6; color: #111827; }

  /* ── Navbar ── */
  nav {
    background: #111827; color: #fff;
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  nav .brand { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
  nav .brand span { color: #60A5FA; }
  nav .nav-btns { display: flex; gap: 10px; align-items: center; }
  .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn-primary   { background: #2563EB; color: #fff; }
  .btn-success   { background: #16A34A; color: #fff; }
  .btn-danger    { background: #DC2626; color: #fff; }
  .btn-ghost     { background: #374151; color: #D1D5DB; }
  .btn-sm        { padding: 5px 11px; font-size: 12px; border-radius: 6px; }

  /* ── Auth banner ── */
  #auth-bar {
    background: #1E3A5F; color: #fff;
    padding: 10px 24px; display: flex; align-items: center; gap: 12px;
    font-size: 13px;
  }
  #auth-bar input {
    padding: 6px 12px; border-radius: 7px; border: none;
    background: #2D4A6B; color: #fff; font-size: 13px; width: 200px;
  }
  #auth-bar input::placeholder { color: #94A3B8; }
  #auth-status { font-size: 12px; }

  /* ── Breadcrumb ── */
  #breadcrumb {
    padding: 12px 24px; background: #fff;
    border-bottom: 1px solid #E5E7EB; font-size: 13px; color: #6B7280;
    display: flex; align-items: center; gap: 6px;
  }
  #breadcrumb span { cursor: pointer; color: #2563EB; }
  #breadcrumb span:hover { text-decoration: underline; }
  #breadcrumb .sep { color: #D1D5DB; }

  /* ── Main content ── */
  #content { padding: 24px; max-width: 900px; margin: 0 auto; }

  /* ── Grid cards ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-top: 16px; }
  .card {
    background: #fff; border-radius: 12px; padding: 20px;
    cursor: pointer; border: 1.5px solid #E5E7EB;
    transition: box-shadow .15s, border-color .15s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); border-color: #93C5FD; }
  .card .card-icon { font-size: 28px; margin-bottom: 10px; }
  .card .card-title { font-size: 15px; font-weight: 700; color: #111827; margin-bottom: 4px; }
  .card .card-meta  { font-size: 12px; color: #9CA3AF; }

  /* ── Question list ── */
  #q-list { margin-top: 16px; display: flex; flex-direction: column; gap: 12px; }
  .q-item {
    background: #fff; border-radius: 12px; padding: 16px;
    border: 1px solid #E5E7EB; font-size: 14px;
  }
  .q-item-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .q-item-text { flex: 1; color: #111827; line-height: 1.5; padding-right: 12px; }
  .q-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 5px;
    font-size: 11px; font-weight: 700; margin-right: 5px;
  }
  .badge-waec { background: #DCFCE7; color: #166534; }
  .badge-neco { background: #DBEAFE; color: #1E40AF; }
  .badge-year { background: #F3F4F6; color: #374151; }

  /* ── Section header ── */
  .section-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .section-hd h2 { font-size: 18px; font-weight: 800; color: #111827; }
  .section-sub { font-size: 13px; color: #9CA3AF; margin-bottom: 16px; }

  /* ── Modal overlay ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.55); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 16px; padding: 28px;
    width: min(520px, 95vw); max-height: 90vh; overflow-y: auto;
  }
  .modal h3 { font-size: 18px; font-weight: 800; margin-bottom: 20px; }
  .form-row { margin-bottom: 16px; }
  .form-row label { display: block; font-size: 12px; font-weight: 700; color: #6B7280; margin-bottom: 5px; letter-spacing: .5px; text-transform: uppercase; }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    border: 1.5px solid #E5E7EB; font-size: 14px; color: #111827;
    transition: border-color .15s; outline: none;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: #2563EB; }
  .form-row textarea { resize: vertical; min-height: 80px; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .option-input-wrap { position: relative; }
  .option-input-wrap .opt-label {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    font-size: 12px; font-weight: 700; color: #9CA3AF;
  }
  .option-input-wrap input { padding-left: 28px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 12px; display: none; }
  .msg.ok  { background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0; }
  .msg.err { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }

  /* ── Catalog edit modal ── */
  .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
  .tag {
    display: flex; align-items: center; gap: 5px;
    background: #F3F4F6; border-radius: 6px; padding: 5px 10px;
    font-size: 13px; font-weight: 600;
  }
  .tag .remove { cursor: pointer; color: #DC2626; font-size: 15px; line-height: 1; }
  .add-tag-row { display: flex; gap: 8px; margin-top: 8px; }
  .add-tag-row input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1.5px solid #E5E7EB; font-size: 14px; }

  /* ── Spinner ── */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Empty ── */
  .empty { text-align: center; padding: 50px 20px; color: #9CA3AF; }
  .empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }
</style>
</head>
<body>

<!-- ── Navbar ── -->
<nav>
  <div class="brand">Learning Lounge <span>Admin</span></div>
  <div class="nav-btns">
    <button class="btn btn-ghost" onclick="openCatalogModal()">✏️ Edit Catalog</button>
    <button class="btn btn-success" onclick="openAddModal()">＋ Add Question</button>
  </div>
</nav>

<!-- ── Auth bar ── -->
<div id="auth-bar">
  🔑 Admin password:
  <input type="password" id="admin-secret" placeholder="Enter password…" oninput="saveSecret()" />
  <span id="auth-status"></span>
</div>

<!-- ── Breadcrumb ── -->
<div id="breadcrumb">
  <span onclick="goHome()">Home</span>
</div>

<!-- ── Main content ── -->
<div id="content">
  <div class="empty"><div class="empty-icon">⏳</div><p>Loading data…</p></div>
</div>

<!-- ══════════════════ ADD / EDIT QUESTION MODAL ══════════════════ -->
<div class="modal-overlay" id="q-modal">
  <div class="modal">
    <h3 id="q-modal-title">Add Question</h3>

    <div class="form-row">
      <label>Subject</label>
      <select id="q-subject"></select>
    </div>
    <div class="form-row">
      <label>Year</label>
      <select id="q-year"></select>
    </div>
    <div class="form-row">
      <label>Source</label>
      <select id="q-source">
        <option value="WAEC">WAEC</option>
        <option value="NECO">NECO</option>
      </select>
    </div>
    <div class="form-row">
      <label>Question</label>
      <textarea id="q-question" placeholder="Type the full question here…"></textarea>
    </div>
    <div class="form-row">
      <label>Options</label>
      <div class="options-grid">
        <div class="option-input-wrap"><span class="opt-label">A</span><input type="text" id="opt-0" placeholder="Option A" /></div>
        <div class="option-input-wrap"><span class="opt-label">B</span><input type="text" id="opt-1" placeholder="Option B" /></div>
        <div class="option-input-wrap"><span class="opt-label">C</span><input type="text" id="opt-2" placeholder="Option C" /></div>
        <div class="option-input-wrap"><span class="opt-label">D</span><input type="text" id="opt-3" placeholder="Option D" /></div>
      </div>
    </div>
    <div class="form-row">
      <label>Correct Answer</label>
      <select id="q-answer">
        <option value="0">A</option>
        <option value="1">B</option>
        <option value="2">C</option>
        <option value="3">D</option>
      </select>
    </div>
    <div class="form-row">
      <label>Explanation</label>
      <textarea id="q-explanation" placeholder="Explain why the correct answer is right…" style="min-height:60px;"></textarea>
    </div>

    <div class="msg" id="q-msg"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeQModal()">Cancel</button>
      <button class="btn btn-primary" id="q-submit-btn" onclick="submitQuestion()">Save Question</button>
    </div>
  </div>
</div>

<!-- ══════════════════ EDIT CATALOG MODAL ══════════════════ -->
<div class="modal-overlay" id="catalog-modal">
  <div class="modal">
    <h3>Edit Catalog</h3>

    <div class="form-row">
      <label>Subjects</label>
      <div class="tag-list" id="subjects-tags"></div>
      <div class="add-tag-row">
        <input type="text" id="new-subject" placeholder="Add subject…" />
        <button class="btn btn-primary btn-sm" onclick="addCatalogItem('subjects')">Add</button>
      </div>
    </div>

    <div class="form-row" style="margin-top:20px;">
      <label>Years</label>
      <div class="tag-list" id="years-tags"></div>
      <div class="add-tag-row">
        <input type="text" id="new-year" placeholder="Add year e.g. 2025…" />
        <button class="btn btn-primary btn-sm" onclick="addCatalogItem('years')">Add</button>
      </div>
    </div>

    <div class="msg" id="catalog-msg"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeCatalogModal()">Cancel</button>
      <button class="btn btn-success" id="catalog-save-btn" onclick="saveCatalog()">Save Catalog</button>
    </div>
  </div>
</div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
// REPLACE with your actual Render backend URL
const BACKEND = 'https://YOUR-APP-NAME.onrender.com';

// ─── State ───────────────────────────────────────────────────────────────────
let appData      = { subjects: [], years: [], questions: [] };
let editCatalog  = { subjects: [], years: [] };
let editingQId   = null;   // null = adding new, string = editing existing
let navState     = { subject: null, year: null, source: null };

// ─── Secret ──────────────────────────────────────────────────────────────────
function getSecret() { return document.getElementById('admin-secret').value.trim(); }
function saveSecret() {
  const s = getSecret();
  document.getElementById('auth-status').textContent = s ? '🔒 Secret entered' : '';
}

// ─── Fetch helpers ────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const res = await fetch(BACKEND + path, {
    method,
    headers: { 'Content-Type': 'application/json', 'x-admin-secret': getSecret() },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ─── Load data ────────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">⏳</div><p>Loading…</p></div>`;
  try {
    appData = await api('GET', '/api/data');
    renderHome();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">❌</div><p>Could not connect to backend.<br><small>${e.message}</small></p></div>`;
  }
}

// ─── Navigation ──────────────────────────────────────────────────────────────
function goHome() {
  navState = { subject: null, year: null, source: null };
  updateBreadcrumb();
  renderHome();
}

function goSubject(subj) {
  navState = { subject: subj, year: null, source: null };
  updateBreadcrumb();
  renderYears(subj);
}

function goSource(subj, source) {
  navState = { subject: subj, year: null, source };
  updateBreadcrumb();
  renderQuestions(subj, source);
}

function updateBreadcrumb() {
  const { subject, source } = navState;
  let html = `<span onclick="goHome()">Home</span>`;
  if (subject) {
    html += `<span class="sep">›</span><span onclick="goSubject('${subject}')">${subject}</span>`;
  }
  if (source) {
    html += `<span class="sep">›</span>${source}`;
  }
  document.getElementById('breadcrumb').innerHTML = html;
}

// ─── Render: Home (subjects grid) ────────────────────────────────────────────
const ICONS = { Mathematics:'📐', Physics:'⚡', Chemistry:'🧪', Biology:'🧬', English:'📝', 'Computer Science':'💻' };

function renderHome() {
  const { subjects, questions } = appData;
  if (!subjects.length) {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>No subjects in catalog yet.<br>Click "Edit Catalog" to add some.</p></div>`;
    return;
  }
  const cards = subjects.map(subj => {
    const count = questions.filter(q => q.subject === subj).length;
    const icon  = ICONS[subj] || '📚';
    return `<div class="card" onclick="goSubject('${subj}')">
      <div class="card-icon">${icon}</div>
      <div class="card-title">${subj}</div>
      <div class="card-meta">${count} question${count !== 1 ? 's' : ''}</div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="section-hd"><h2>All Subjects</h2></div>
    <p class="section-sub">Click a subject to view its questions</p>
    <div class="grid">${cards}</div>
  `;
}

// ─── Render: Years list for a subject ────────────────────────────────────────
function renderYears(subj) {
  const questions = appData.questions.filter(q => q.subject === subj);
  const usedYears = [...new Set(questions.map(q => q.year))].sort((a,b) => b - a);
  const allYears  = appData.years;

  const sources = ['WAEC', 'NECO'];

  // Group by source — show WAEC and NECO cards
  const cards = sources.map(src => {
    const count = questions.filter(q => q.source === src).length;
    return `<div class="card" onclick="goSource('${subj}', '${src}')">
      <div class="card-icon">${src === 'WAEC' ? '🟢' : '🔵'}</div>
      <div class="card-title">${src}</div>
      <div class="card-meta">${count} question${count !== 1 ? 's' : ''}</div>
    </div>
    <div class="card" onclick="goSource('${subj}', 'All')">`;
  });

  // Show WAEC, NECO, All
  const all = ['WAEC','NECO','All'].map(src => {
    const count = src === 'All' ? questions.length : questions.filter(q => q.source === src).length;
    const icon  = src === 'WAEC' ? '🟢' : src === 'NECO' ? '🔵' : '📋';
    return `<div class="card" onclick="goSource('${subj}', '${src}')">
      <div class="card-icon">${icon}</div>
      <div class="card-title">${src}</div>
      <div class="card-meta">${count} question${count !== 1 ? 's' : ''}</div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="section-hd">
      <h2>${subj}</h2>
      <button class="btn btn-success btn-sm" onclick="openAddModalFor('${subj}')">＋ Add Question</button>
    </div>
    <p class="section-sub">${questions.length} total questions · Choose source to browse</p>
    <div class="grid">${all}</div>
  `;
}

// ─── Render: Questions list ───────────────────────────────────────────────────
function renderQuestions(subj, source) {
  const qs = appData.questions.filter(q =>
    q.subject === subj && (source === 'All' || q.source === source)
  );

  const OPTS = ['A','B','C','D'];

  const items = qs.length ? qs.map(q => `
    <div class="q-item">
      <div class="q-item-top">
        <div class="q-item-text">
          <span class="badge badge-year">${q.year}</span>
          <span class="badge ${q.source === 'WAEC' ? 'badge-waec' : 'badge-neco'}">${q.source}</span>
          <br/><br/>
          ${q.question}
          <br/><small style="color:#6B7280;margin-top:6px;display:block;">
            ${q.options.map((o,i) => `<b>${OPTS[i]}.</b> ${o}`).join(' &nbsp;·&nbsp; ')}
          </small>
          <small style="color:#16A34A;margin-top:4px;display:block;">✓ ${OPTS[q.answer]}: ${q.options[q.answer]}</small>
        </div>
        <div class="q-item-actions">
          <button class="btn btn-ghost btn-sm" onclick="openEditModal('${q.id}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteQuestion('${q.id}')">🗑</button>
        </div>
      </div>
    </div>
  `).join('') : `<div class="empty"><div class="empty-icon">📭</div><p>No questions for ${subj} · ${source} yet.</p></div>`;

  document.getElementById('content').innerHTML = `
    <div class="section-hd">
      <h2>${subj} · ${source}</h2>
      <button class="btn btn-success btn-sm" onclick="openAddModalFor('${subj}')">＋ Add Question</button>
    </div>
    <p class="section-sub">${qs.length} question${qs.length !== 1 ? 's' : ''}</p>
    <div id="q-list">${items}</div>
  `;
}

// ─── Add / Edit Question Modal ────────────────────────────────────────────────
function populateDropdowns() {
  const subjSel = document.getElementById('q-subject');
  const yearSel = document.getElementById('q-year');
  subjSel.innerHTML = appData.subjects.map(s => `<option value="${s}">${s}</option>`).join('');
  yearSel.innerHTML = [...appData.years].sort((a,b)=>b-a).map(y => `<option value="${y}">${y}</option>`).join('');
}

function openAddModal() {
  editingQId = null;
  document.getElementById('q-modal-title').textContent = 'Add Question';
  clearQForm();
  populateDropdowns();
  document.getElementById('q-modal').classList.add('open');
}

function openAddModalFor(subj) {
  openAddModal();
  document.getElementById('q-subject').value = subj;
}

function openEditModal(id) {
  const q = appData.questions.find(q => q.id === id);
  if (!q) return;
  editingQId = id;
  document.getElementById('q-modal-title').textContent = 'Edit Question';
  populateDropdowns();
  document.getElementById('q-subject').value    = q.subject;
  document.getElementById('q-year').value       = q.year;
  document.getElementById('q-source').value     = q.source;
  document.getElementById('q-question').value   = q.question;
  q.options.forEach((o, i) => { document.getElementById(`opt-${i}`).value = o; });
  document.getElementById('q-answer').value     = q.answer;
  document.getElementById('q-explanation').value = q.explanation;
  document.getElementById('q-modal').classList.add('open');
}

function closeQModal() {
  document.getElementById('q-modal').classList.remove('open');
  clearQForm();
}

function clearQForm() {
  ['q-question','q-explanation','opt-0','opt-1','opt-2','opt-3'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('q-answer').value = '0';
  showMsg('q-msg', '', '');
}

async function submitQuestion() {
  const btn = document.getElementById('q-submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Saving…';

  const body = {
    subject:     document.getElementById('q-subject').value,
    year:        document.getElementById('q-year').value,
    source:      document.getElementById('q-source').value,
    question:    document.getElementById('q-question').value.trim(),
    options:     [0,1,2,3].map(i => document.getElementById(`opt-${i}`).value.trim()),
    answer:      parseInt(document.getElementById('q-answer').value),
    explanation: document.getElementById('q-explanation').value.trim(),
  };

  if (!body.question || body.options.some(o => !o) || !body.explanation) {
    showMsg('q-msg', 'Please fill in all fields.', 'err');
    btn.disabled = false; btn.textContent = 'Save Question';
    return;
  }

  try {
    if (editingQId) {
      const updated = await api('PUT', `/api/questions/${editingQId}`, body);
      const idx = appData.questions.findIndex(q => q.id === editingQId);
      if (idx !== -1) appData.questions[idx] = updated.question;
    } else {
      const result = await api('POST', '/api/questions', body);
      appData.questions.push(result.question);
    }
    showMsg('q-msg', '✅ Question saved!', 'ok');
    setTimeout(() => {
      closeQModal();
      // Re-render current view
      if (navState.source) renderQuestions(navState.subject, navState.source);
      else if (navState.subject) renderYears(navState.subject);
      else renderHome();
    }, 800);
  } catch (e) {
    showMsg('q-msg', `❌ ${e.message}`, 'err');
  }
  btn.disabled = false; btn.textContent = 'Save Question';
}

async function deleteQuestion(id) {
  if (!confirm('Delete this question? This cannot be undone.')) return;
  try {
    await api('DELETE', `/api/questions/${id}`);
    appData.questions = appData.questions.filter(q => q.id !== id);
    if (navState.source) renderQuestions(navState.subject, navState.source);
    else if (navState.subject) renderYears(navState.subject);
    else renderHome();
  } catch (e) {
    alert(`Error: ${e.message}`);
  }
}

// ─── Catalog Modal ────────────────────────────────────────────────────────────
function openCatalogModal() {
  editCatalog = { subjects: [...appData.subjects], years: [...appData.years] };
  renderCatalogTags();
  document.getElementById('catalog-modal').classList.add('open');
}

function closeCatalogModal() {
  document.getElementById('catalog-modal').classList.remove('open');
}

function renderCatalogTags() {
  ['subjects','years'].forEach(type => {
    document.getElementById(`${type}-tags`).innerHTML = editCatalog[type].map(item => `
      <div class="tag">
        ${item}
        <span class="remove" onclick="removeCatalogItem('${type}', '${item}')">×</span>
      </div>
    `).join('');
  });
}

function addCatalogItem(type) {
  const inputId = type === 'subjects' ? 'new-subject' : 'new-year';
  const val = document.getElementById(inputId).value.trim();
  if (!val || editCatalog[type].includes(val)) return;
  editCatalog[type].push(val);
  document.getElementById(inputId).value = '';
  renderCatalogTags();
}

function removeCatalogItem(type, item) {
  editCatalog[type] = editCatalog[type].filter(i => i !== item);
  renderCatalogTags();
}

async function saveCatalog() {
  const btn = document.getElementById('catalog-save-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Saving…';
  try {
    await api('PUT', '/api/catalog', { subjects: editCatalog.subjects, years: editCatalog.years });
    appData.subjects = editCatalog.subjects;
    appData.years    = editCatalog.years;
    showMsg('catalog-msg', '✅ Catalog saved! App will reflect changes.', 'ok');
    setTimeout(closeCatalogModal, 1000);
    renderHome();
  } catch (e) {
    showMsg('catalog-msg', `❌ ${e.message}`, 'err');
  }
  btn.disabled = false; btn.textContent = 'Save Catalog';
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type}`;
  el.style.display = text ? 'block' : 'none';
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
